function fbGet(path,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',FB_URL+path+'.json?auth='+FB_KEY);
  xhr.onload=function(){
    try{cb(null,JSON.parse(xhr.responseText));}catch(e){cb(e,null);}
  };
  xhr.onerror=function(){cb(new Error('network'),null);};
  xhr.send();
}
function fbSet(path,data,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('PUT',FB_URL+path+'.json?auth='+FB_KEY);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.onload=function(){if(cb)cb(xhr.status===200?null:new Error(xhr.status));};
  xhr.onerror=function(){if(cb)cb(new Error('network'));};
  xhr.send(JSON.stringify(data));
}

// ── RECON ─────────────────────────────────────────────────────────────────
function buildRecon(){
  var cnt={};
  S.days.forEach(function(day,di){
    if(!day.oid)return;
    var o=findO(day.oid);if(!o)return;
    (o.it||[]).concat(o.sh?[o.sh]:[]).forEach(function(id){
      if(!cnt[id])cnt[id]={n:0,days:[]};
      cnt[id].n++;cnt[id].days.push({dt:day.dt,c:day.c,di:di});
    });
  });
  var flags=[];
  keys(cnt).forEach(function(id){
    var d=cnt[id];
    if(SHOES.indexOf(id)>=0||SKIP.indexOf(id)>=0)return;
    var s=d.days.slice().sort(function(a,b){return a.di-b.di;});
    for(var i=1;i<s.length;i++){
      if(s[i].di-s[i-1].di<=1)flags.push({type:'btb',id:id,days:[s[i-1].dt,s[i].dt]});
    }
    if(d.n===1&&ONEOK.indexOf(id)<0)flags.push({type:'once',id:id,day:d.days[0].dt});
    if(d.n>4&&PANTS.indexOf(id)<0)flags.push({type:'over',id:id,n:d.n});
  });
  var oc={};
  S.days.forEach(function(d){if(d.oid)oc[d.oid]=(oc[d.oid]||0)+1;});
  keys(oc).forEach(function(oid){
    if(oc[oid]>1){var o=findO(oid);if(o)flags.push({type:'dup',oid:oid,nm:o.n,c:oc[oid]});}
  });
  return{cnt:cnt,flags:flags};
}
function getRC(){if(!_rc)_rc=buildRecon();return _rc;}
function inv(){_rc=null;}
function wc(id){return(getRC().cnt[id]||{n:0}).n;}
function isFl(id){return getRC().flags.some(function(f){return f.id===id;});}
function oFl(oid){var o=findO(oid);if(!o)return false;return(o.it||[]).concat(o.sh?[o.sh]:[]).some(isFl);}
function uCt(oid){return S.days.filter(function(d){return d.oid===oid;}).length;}
function findO(oid){for(var i=0;i<S.mf.length;i++){if(S.mf[i].id===oid)return S.mf[i];}return null;}

// ── RECOMMENDER ───────────────────────────────────────────────────────────
function scoreO(o,day,di){
  var isEve=EVE_PAT.test(day.lbl),s=100,r=[],w=[];
  if(o.ev&&!isEve){s-=40;w.push('Evening outfit for daytime');}
  if(!o.ev&&isEve){s-=30;w.push('Daytime for evening');}
  if(o.tag==='dinner'&&isEve){s+=20;r.push('Evening-appropriate');}
  if(o.tag==='bop'&&!isEve){s+=10;r.push('Good exploring energy');}
  var all=(o.it||[]).concat(o.sh?[o.sh]:[]);
  var avg=all.length?all.reduce(function(a,id){return a+wc(id);},0)/all.length:0;
  if(avg<1){s+=20;r.push('Items need more wear');}
  else if(avg>3){s-=20;w.push('Items already well-worn');}
  var prev=di>0?S.days[di-1]:null;
  if(prev&&prev.oid===o.id){s-=50;w.push('Same as yesterday');}
  var u=uCt(o.id);
  if(u===0){s+=15;r.push('Not yet worn');}
  else if(u>=2){s-=30;w.push('Used '+u+'x already');}
  if(COLD[day.c]&&!(o.it||[]).some(function(id){return IT[id]&&IT[id].t==='outer';}))w.push('No layer — Seoul chilly');
  return{score:s,why:r.concat(w.map(function(x){return'⚠ '+x;})).slice(0,3).join(' · ')};
}
function getRecs(day,di){
  var sc=S.mf.map(function(o){var s=scoreO(o,day,di);return{o:o,score:s.score,why:s.why};});
  sc.sort(function(a,b){return b.score-a.score;});
  return sc.slice(0,3);
}

  ['owned','rtr','buy'].forEach(function(s){h+='<option value="'+s+'"'+(src===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>';});
  h+='</select></div></div>';
  h+='<div class="brow"><button class="bsave" onclick="saveEditItem()">Save</button><button class="bcan" onclick="closeModal(\'m-edititem\')">Cancel</button></div>';
  el('m-edititem-body').innerHTML=h;el('m-edititem').classList.add('on');
}
function saveEditItem(){
  var n=val('ei-n').trim(),t=val('ei-t'),s=val('ei-s');
  if(!n){alert('Please enter a name');return;}
  IT[_eiid]={n:n,t:t,r:s==='rtr'?1:0};
  inv();saveState();closeModal('m-edititem');renderPack();renderLib();renderSched();
}
function delIt(id){IT[id]._cfm=true;renderPack();}
function delItYes(id){
  S.mf=S.mf.map(function(o){return Object.assign({},o,{it:(o.it||[]).filter(function(x){return x!==id;}),sh:o.sh===id?null:o.sh});});
  delete IT[id];delete S.checks[id];
  inv();saveState();renderPack();renderLib();renderSched();renderRecon();
}
function delItNo(id){if(IT[id])delete IT[id]._cfm;renderPack();}

// ── RECON TAB ─────────────────────────────────────────────────────────────
function renderRecon(){
  var r=getRC();
  var h='<div class="sec">';
  if(r.flags.length){
    h+='<div style="font-size:12px;font-weight:500;color:#1c1a18;margin-bottom:8px">Flags ('+r.flags.length+')</div>';
    r.flags.forEach(function(f){
      var btb=f.type==='btb',item=IT[f.id]?IT[f.id].n:null;
      h+='<div class="fcrd '+(btb?'r':'a')+'">';
      if(f.type==='dup')h+='<b>'+esc(f.nm)+'</b> <span style="color:#7a7268">used '+f.c+'x — duplicate outfit</span>';
      else if(item)h+='<b>'+esc(item)+'</b> <span style="color:#7a7268">'+(btb?'back-to-back: '+f.days.join(' > '):f.type==='once'?'worn once ('+f.day+')':'worn '+f.n+'x — consider reducing')+'</span>';
      h+='</div>';
    });
  }else{h+='<div class="fcrd g">No flags — all good!</div>';}
  h+='<div style="font-size:12px;font-weight:500;color:#1c1a18;margin:16px 0 8px">Wear counts</div>';
  keys(r.cnt).sort(function(a,b){return r.cnt[b].n-r.cnt[a].n;}).forEach(function(id){
    var d=r.cnt[id],item=IT[id];if(!item)return;
    var f=isFl(id),bc=f?'#d94f3f':d.n>=3?'#2a7a54':'#c4a882';
    h+='<div class="wcrow"><div style="flex:1"><div style="font-size:13px;color:'+(f?'#d94f3f':'#1c1a18')+'">'+esc(item.n)+(f?'<span style="color:#d94f3f"> !</span>':'')+'</div>';
    h+='<div style="display:flex;gap:3px;margin-top:3px;flex-wrap:wrap">';
    d.days.forEach(function(x){h+='<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:#ede9e3;color:#7a7268">'+x.c.slice(0,3)+'</span>';});
    h+='</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:500;color:'+bc+'">'+d.n+'x</div>';
    h+='<div class="wbar"><div class="wfill" style="background:'+bc+';width:'+Math.min(100,Math.round(d.n/6*100))+'%"></div></div></div></div>';
  });
  h+='<div style="font-size:12px;font-weight:500;color:#1c1a18;margin:16px 0 8px">Never worn</div>';
  entries(IT).forEach(function(e){
    if(!r.cnt[e[0]])h+='<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.09);font-size:13px;color:#7a7268"><span>'+esc(e[1].n)+'</span><span>0x</span></div>';
  });
  h+='</div>';
  el('pane-recon').innerHTML=h;
}

// ── TABS ──────────────────────────────────────────────────────────────────
function showTab(t,btn){
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('on');
  var panes=document.querySelectorAll('.pane');
  for(var j=0;j<panes.length;j++)panes[j].classList.remove('on');
  btn.classList.add('on');
  el('pane-'+t).classList.add('on');
  if(t==='sched')renderSched();
  else if(t==='lib')renderLib();
  else if(t==='pack')renderPack();
  else if(t==='recon')renderRecon();
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadState(function(){
  renderSched();
  renderLib();
  renderPack();
  renderRecon();
});
</script>
